<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B2A4A" />
    <title>Çevrimdışı — Gözde Akın</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        background: linear-gradient(160deg, #f5f7fa 0%, #e8ecf2 100%);
        color: #1b2a4a;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 360px;
        background: #fff;
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 20px 60px rgba(27, 42, 74, 0.12);
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #c8102e;
        color: #fff;
        font-weight: 700;
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
      }
      h1 { font-size: 1.25rem; margin-bottom: 8px; }
      p { font-size: 0.95rem; color: #1b2a4a99; line-height: 1.5; margin-bottom: 20px; }
      button {
        background: #2d6a4f;
        color: #fff;
        border: none;
        border-radius: 999px;
        padding: 12px 24px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">GA</div>
      <h1>İnternet bağlantısı yok</h1>
      <p>Önbelleğe alınmış sayfaları görüntüleyebilir veya bağlantınızı kontrol edebilirsiniz.</p>
      <button onclick="location.reload()">Yeniden dene</button>
    </div>
  </body>
</html>
